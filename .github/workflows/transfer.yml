name: Google Services to Proton Stream
on:
  workflow_dispatch:
    inputs:
      source_service:
        description: 'Which service to export?'
        type: choice
        required: true
        options:
          - gdrive
          - gphotos
        default: gdrive
      source_path:
        description: 'Specific folder (leave blank to auto-sync everything safely)'
        required: false
        default: ''
      dest_path:
        description: 'Destination folder in Proton Drive'
        required: true
        default: 'Google_Backup'

jobs:
  migrate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Install Latest Rclone
        run: sudo -v ; curl https://rclone.org/install.sh | sudo bash

      - name: Inject Configuration Secret
        env:
          SECRET_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$SECRET_CONF" > ~/.config/rclone/rclone.conf

      - name: Stream Files to Proton
        run: |
          # 1. Auto-handle the Google Photos duplicate issue
          FINAL_SOURCE="${{ inputs.source_path }}"

          if [[ "${{ inputs.source_service }}" == "gphotos" && -z "$FINAL_SOURCE" ]]; then
            # Default to media/by-year to prevent downloading albums and raw files twice
            FINAL_SOURCE="media/by-year"
            echo "Google Photos selected with empty path. Auto-targeting '$FINAL_SOURCE' to avoid duplicates."
          fi

          # 2. Construct the exact remote path
          if [[ -z "$FINAL_SOURCE" ]]; then
            REMOTE_SOURCE="${{ inputs.source_service }}:"
          else
            REMOTE_SOURCE="${{ inputs.source_service }}:${FINAL_SOURCE}"
          fi

          echo "Starting stream from $REMOTE_SOURCE to proton:${{ inputs.dest_path }}"

          # 3. Execute with rate-limit protections
          rclone copy "$REMOTE_SOURCE" "proton:${{ inputs.dest_path }}" \
            --check-first \
            --tpslimit 10 \
            --transfers 4 \
            --retries 5 \
            --retries-sleep 30s \
            --stats 30s \
            -v
